<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Viewer</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --primary: #0d6efd;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    body.dark {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #334155;
      --primary: #60a5fa;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .brand {
      font-weight: 700;
      font-size: 1.35rem;
      color: var(--text);
      text-decoration: none;
    }

    .toolbar { gap: 0.5rem; }
    .toolbar .btn { white-space: nowrap; }

    .main-wrap { padding: 0; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-weight: 600;
      margin: 0;
      font-size: 1rem;
    }

    .panel-subtitle { color: var(--muted); font-size: 0.9rem; }

    #editor,
    #selectedCode {
      width: 100%;
      height: 42vh;
    }

    #previewFrame {
      width: 100%;
      height: 86vh;
      border: 0;
      background: white;
    }

    .status-bar { color: var(--muted); font-size: 0.9rem; }

    .footer-note {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.75rem 0;
      text-align: center;
      width: 100%;
    }

    .btn-soft {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-soft:hover {
      background: var(--border);
      color: var(--text);
    }

    .panel-collapse-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .panel-collapse-btn:hover { background: var(--surface-2); }

    .panel-body-collapsible { transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; }
    .panel-body-collapsible.collapsed { max-height: 0 !important; opacity: 0; }

    /* Botón copiar en panel-header */
    .btn-copy-panel {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .btn-copy-panel:hover {
      background: var(--surface-2);
      color: var(--primary);
    }
    .btn-copy-panel.copied { color: #16a34a; }

    .panel-actions {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }

    .ace_gutter { background: transparent !important; }

    /* ── Split layout resizable ─────────────────────────────────────── */
    #splitContainer {
      display: flex;
      gap: 0;
      align-items: stretch;
      padding: 1rem;
      padding-bottom: 0;
    }

    #leftCol {
      width: 33%;
      min-width: 200px;
      max-width: 70%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    /* El panel de preview ocupa toda la altura de la columna derecha */
    #rightCol {
      flex: 1;
      min-width: 200px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #rightCol .panel {
      flex: 1;
    }

    #rightCol #previewFrame {
      width: 100%;
      flex: 1;
      min-height: 0;
      border: 0;
      background: white;
      display: block;
    }

    /* El panel del preview usa flex para que el iframe estire */
    #rightCol .panel {
      display: flex;
      flex-direction: column;
    }

    #splitDivider {
      width: 12px;
      flex-shrink: 0;
      cursor: col-resize;
      display: flex;
      align-items: stretch;
      justify-content: center;
      position: relative;
      z-index: 10;
      user-select: none;
    }

    #splitDividerHandle {
      width: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.7rem;
      transition: background 0.15s, color 0.15s;
      min-height: 60px;
    }

    #splitDivider:hover #splitDividerHandle,
    #splitDivider.dragging #splitDividerHandle {
      background: var(--primary);
      color: white;
    }

    #splitDivider.dragging { cursor: col-resize; }

    /* Footer siempre centrado respecto a la ventana */
    .footer-note {
      width: 100%;
      text-align: center;
    }

    /* Evitar selección de texto al arrastrar */
    body.resizing {
      cursor: col-resize !important;
      user-select: none !important;
    }
    body.resizing iframe { pointer-events: none; }

    @media (max-width: 991px) {
      #splitContainer {
        flex-direction: column;
        padding: 0.75rem;
      }
      #leftCol, #rightCol {
        width: 100% !important;
        max-width: 100%;
      }
      #splitDivider { display: none; }
      #editor, #selectedCode { height: 32vh; }
      #previewFrame { height: 48vh !important; }
    }

    @media (min-width: 992px) {
      #splitContainer { height: calc(100vh - var(--header-h, 120px) - 2.5rem); }
      #editor, #selectedCode { height: 42vh; }
      #previewFrame { height: 100% !important; }
    }
    /* ────────────────────────────────────────────────────────────────── */
  </style>
</head>
<body>
  <header class="app-header">
    <div class="container-fluid py-3">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
          <a href="#" class="brand">
            <i class="fa-brands fa-html5 me-2"></i>HTML Viewer
          </a>
          <div class="status-bar" id="statusText" aria-live="polite" aria-atomic="true">Ready</div>
        </div>

        <div class="toolbar d-flex flex-wrap">
          <button class="btn btn-primary" id="btnPreview" aria-label="Open preview in new tab">
            <i class="fa-regular fa-window-restore me-1" aria-hidden="true"></i> Preview
          </button>
          <button class="btn btn-soft" id="btnFormat" aria-label="Format HTML">
            <i class="fa-solid fa-wand-magic-sparkles me-1" aria-hidden="true"></i> Format
          </button>
          <button class="btn btn-soft" id="btnCollapse" aria-label="Collapse all code sections">
            <i class="fa-solid fa-down-left-and-up-right-to-center me-1" aria-hidden="true"></i> Collapse
          </button>
          <button class="btn btn-soft" id="btnSample" aria-label="Load sample HTML">
            <i class="fa-regular fa-file-lines me-1" aria-hidden="true"></i> Sample
          </button>
          <button class="btn btn-soft" id="btnClear" aria-label="Clear editor">
            <i class="fa-regular fa-trash-can me-1" aria-hidden="true"></i> Clear
          </button>
          <button class="btn btn-soft" id="btnImport" aria-label="Import HTML from file">
            <i class="fa-solid fa-file-import me-1" aria-hidden="true"></i> Import file
          </button>
          <button class="btn btn-soft" id="btnExport" aria-label="Export HTML to file">
            <i class="fa-solid fa-file-export me-1" aria-hidden="true"></i> Export file
          </button>
          <button class="btn btn-soft" id="btnTheme" aria-label="Toggle dark mode">
            <i class="fa-regular fa-moon me-1" aria-hidden="true"></i> Dark mode
          </button>
          <input type="file" id="fileInput" accept=".html,.htm,.txt" hidden aria-label="Select file to import" />
        </div>
      </div>
    </div>
  </header>

  <main class="main-wrap container-fluid">
    <div id="splitContainer">

      <!-- Columna izquierda -->
      <div id="leftCol">

        <!-- Panel Editor -->
        <section class="panel mb-3">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">Editor</h2>
              <div class="panel-subtitle">Put your HTML text here</div>
            </div>
            <div class="panel-actions">
              <button class="btn-copy-panel" id="btnCopyEditor" aria-label="Copy editor content" title="Copy HTML">
                <i class="fa-regular fa-copy" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div id="editor" role="textbox" aria-label="HTML code editor" aria-multiline="true"></div>
        </section>

        <!-- Panel Selected Element Code -->
        <section class="panel" id="selectedPanel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">Selected Element Code</h2>
              <div class="panel-subtitle">Click an element in preview to inspect</div>
            </div>
            <div class="panel-actions">
              <button class="btn-copy-panel" id="btnCopySelected" aria-label="Copy selected element code" title="Copy element HTML">
                <i class="fa-regular fa-copy" aria-hidden="true"></i>
              </button>
              <button class="panel-collapse-btn" id="btnToggleSelected" aria-label="Toggle selected element panel" aria-expanded="true" aria-controls="selectedCodeWrap">
                <i class="fa-solid fa-chevron-up" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div class="panel-body-collapsible" id="selectedCodeWrap">
            <div id="selectedCode" aria-label="Selected element HTML code" aria-readonly="true"></div>
          </div>
        </section>

      </div>

      <!-- Divider arrastrable -->
      <div id="splitDivider" title="Drag to resize" aria-hidden="true">
        <div id="splitDividerHandle">
          <i class="fa-solid fa-grip-lines-vertical"></i>
        </div>
      </div>

      <!-- Columna derecha -->
      <div id="rightCol">
        <section class="panel">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">Live Preview</h2>
              <div class="panel-subtitle">Hover to highlight, click to inspect</div>
            </div>
          </div>
          <iframe
            id="previewFrame"
            sandbox="allow-scripts allow-forms allow-modals"
            referrerpolicy="no-referrer"
            title="HTML live preview"
            aria-label="Live preview of HTML code"
          ></iframe>
        </section>
      </div>

    </div>

    <div class="footer-note">
      Built with ❤️ — by Carlos Ortiz &copy; <span id="footerYear"></span>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ext-language_tools.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-html.min.js"></script>

  <script>
    const SAMPLE_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f8fafc;
      color: #1f2937;
    }
    .card {
      max-width: 560px;
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
    }
    button {
      padding: .75rem 1rem;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, world</h1>
    <p>This is a sample HTML snippet rendered in real time.</p>
    <button onclick="alert('Preview is working')">Test button</button>
  </div>
</body>
</html>`;

    const INSPECTOR_MARKER = "data-html-viewer-inspector";

    const INSPECTOR_SCRIPT = `
<script ${INSPECTOR_MARKER}>
(function () {
  let currentHovered = null;

  function clearHover(el) {
    if (!el) return;
    el.style.outline = el.__originalOutline || "";
    el.style.outlineOffset = el.__originalOutlineOffset || "";
  }

  function applyHover(el) {
    if (!el || el === document.documentElement || el === document.body) return;
    if (currentHovered && currentHovered !== el) clearHover(currentHovered);
    if (!el.__originalOutlineCaptured) {
      el.__originalOutline = el.style.outline || "";
      el.__originalOutlineOffset = el.style.outlineOffset || "";
      el.__originalOutlineCaptured = true;
    }
    el.style.outline = "2px solid #ff4d4f";
    el.style.outlineOffset = "2px";
    currentHovered = el;
  }

  document.addEventListener("mouseover", function (e) {
    const el = e.target;
    if (!el || el === document.documentElement || el === document.body) return;
    applyHover(el);
  }, true);

  document.addEventListener("mouseout", function (e) {
    const el = e.target;
    if (!el || el === document.documentElement || el === document.body) return;
    if (el === currentHovered) { clearHover(el); currentHovered = null; }
  }, true);

  document.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    const el = e.target;
    if (!el || el === document.documentElement) return;
    window.parent.postMessage({
      type: "ELEMENT_SELECTED",
      html: el.outerHTML || "",
      tag: el.tagName || ""
    }, "*");
  }, true);
})();
<\/script>`;

    const editor = ace.edit("editor");
    const selectedCode = ace.edit("selectedCode");
    const previewFrame = document.getElementById("previewFrame");
    const statusText = document.getElementById("statusText");
    const fileInput = document.getElementById("fileInput");
    const btnTheme = document.getElementById("btnTheme");

    editor.setTheme("ace/theme/chrome");
    editor.session.setMode("ace/mode/html");
    editor.setOptions({
      fontSize: "14px",
      wrap: true,
      useSoftTabs: true,
      tabSize: 2,
      showPrintMargin: false,
      enableBasicAutocompletion: true,
      enableLiveAutocompletion: true
    });

    selectedCode.setTheme("ace/theme/chrome");
    selectedCode.session.setMode("ace/mode/html");
    selectedCode.setOptions({
      fontSize: "13px",
      wrap: true,
      useSoftTabs: true,
      tabSize: 2,
      showPrintMargin: false,
      readOnly: true,
      highlightActiveLine: false,
      highlightGutterLine: false
    });
    selectedCode.setValue("Click an element in the preview to see its HTML here.", -1);

    // Calcular altura disponible descontando el header
    function updateSplitHeight() {
      const headerH = document.querySelector(".app-header").getBoundingClientRect().height;
      const footerH = 42; // padding + texto footer aprox
      document.getElementById("splitContainer").style.height =
        `calc(100vh - ${headerH}px - ${footerH}px - 1rem)`;
    }
    updateSplitHeight();
    window.addEventListener("resize", updateSplitHeight);

    const LOCAL_STORAGE_KEY = "html-playground-live-content";
    const THEME_STORAGE_KEY = "html-playground-live-theme";

    function setStatus(text) {
      statusText.textContent = text;
    }

    // ── Copiar al portapapeles con feedback visual ──────────────────────────
    function copyToClipboard(text, btn) {
      if (!text.trim()) {
        setStatus("⚠️ Nothing to copy");
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        const icon = btn.querySelector("i");
        const originalClass = icon.className;
        icon.className = "fa-solid fa-check";
        btn.classList.add("copied");
        setStatus("Copied to clipboard ✓");
        setTimeout(() => {
          icon.className = originalClass;
          btn.classList.remove("copied");
        }, 2000);
      }).catch(() => {
        setStatus("⚠️ Could not copy — check browser permissions");
      });
    }

    document.getElementById("btnCopyEditor").addEventListener("click", function () {
      copyToClipboard(editor.getValue(), this);
    });

    document.getElementById("btnCopySelected").addEventListener("click", function () {
      const PLACEHOLDER = "Click an element in the preview to see its HTML here.";
      const content = selectedCode.getValue();
      copyToClipboard(content === PLACEHOLDER ? "" : content, this);
    });
    // ───────────────────────────────────────────────────────────────────────

    function injectInspector(html) {
      if (html.includes(INSPECTOR_MARKER)) return html;
      if (html.includes("</body>")) {
        return html.replace("</body>", INSPECTOR_SCRIPT + "\n</body>");
      }
      return html + INSPECTOR_SCRIPT;
    }

    function renderPreview() {
      const html = editor.getValue();
      const finalHtml = injectInspector(html);
      previewFrame.srcdoc = finalHtml;
      try {
        localStorage.setItem(LOCAL_STORAGE_KEY, html);
      } catch (err) {
        if (err instanceof DOMException && (
          err.name === "QuotaExceededError" ||
          err.name === "NS_ERROR_DOM_QUOTA_REACHED"
        )) {
          setStatus("⚠️ Storage full — changes not saved locally");
          return;
        }
      }
      setStatus("Preview updated");
    }

    function debounce(fn, delay = 250) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const debouncedRender = debounce(renderPreview, 300);
    editor.session.on("change", debouncedRender);

    function loadInitialContent() {
      let saved = null;
      try {
        saved = localStorage.getItem(LOCAL_STORAGE_KEY);
      } catch (err) {
        console.warn("Could not read from localStorage:", err);
      }

      if (saved) {
        // Si hay contenido guardado, formatearlo y cargarlo
        let formatted = saved;
        try {
          formatted = html_beautify(saved, {
            indent_size: 2,
            wrap_line_length: 100,
            preserve_newlines: true,
            max_preserve_newlines: 2,
            end_with_newline: false,
            extra_liners: []
          });
        } catch (_) {}
        editor.setValue(formatted, -1);
        setTimeout(() => {
          editor.execCommand("unfoldall");
          foldState = "expanded";
          syncFoldButton();
        }, 0);
        renderPreview();
        setStatus("Ready — code formatted & expanded");
      } else {
        // Sin contenido previo: editor vacío
        editor.setValue("", -1);
        renderPreview();
        setStatus("Ready — paste or type your HTML");
      }
    }

    function updateThemeButton() {
      const isDark = document.body.classList.contains("dark");
      btnTheme.innerHTML = isDark
        ? '<i class="fa-regular fa-sun me-1" aria-hidden="true"></i> Light mode'
        : '<i class="fa-regular fa-moon me-1" aria-hidden="true"></i> Dark mode';
      btnTheme.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
    }

    function applyTheme(mode) {
      if (mode === "dark") {
        document.body.classList.add("dark");
        editor.setTheme("ace/theme/monokai");
        selectedCode.setTheme("ace/theme/monokai");
        setStatus("Dark mode enabled");
      } else {
        document.body.classList.remove("dark");
        editor.setTheme("ace/theme/chrome");
        selectedCode.setTheme("ace/theme/chrome");
        setStatus("Light mode enabled");
      }
      try {
        localStorage.setItem(THEME_STORAGE_KEY, mode);
      } catch (err) {
        console.warn("Could not save theme preference:", err);
      }
      updateThemeButton();
    }

    function toggleTheme() {
      const isDark = document.body.classList.contains("dark");
      applyTheme(isDark ? "light" : "dark");
    }

    function loadTheme() {
      let savedTheme = "light";
      try {
        savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || "light";
      } catch (err) {
        console.warn("Could not read theme preference:", err);
      }
      applyTheme(savedTheme);
    }

    function openPreviewInNewTab() {
      const html = editor.getValue();
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const win = window.open(url, "_blank");
      if (!win) {
        setStatus("⚠️ Popup blocked — please allow popups for this site");
        URL.revokeObjectURL(url);
        return;
      }
      win.addEventListener("load", () => URL.revokeObjectURL(url), { once: true });
      setStatus("Preview opened in new tab");
    }

    function formatHTML() {
      try {
        const formatted = html_beautify(editor.getValue(), {
          indent_size: 2,
          wrap_line_length: 100,
          preserve_newlines: true,
          max_preserve_newlines: 2,
          end_with_newline: false,
          extra_liners: []
        });
        editor.setValue(formatted, -1);
        setTimeout(() => {
          editor.execCommand("unfoldall");
          foldState = "expanded";
          syncFoldButton();
        }, 0);
        renderPreview();
        setStatus("HTML formatted & expanded");
      } catch (error) {
        console.error(error);
        setStatus("⚠️ Could not format HTML");
      }
    }

    // ── Toggle Collapse / Expand ────────────────────────────────────────────
    let foldState = "expanded";
    const btnCollapse = document.getElementById("btnCollapse");

    function syncFoldButton() {
      if (foldState === "expanded") {
        btnCollapse.innerHTML = '<i class="fa-solid fa-down-left-and-up-right-to-center me-1" aria-hidden="true"></i> Collapse';
        btnCollapse.setAttribute("aria-label", "Collapse all code sections");
      } else {
        btnCollapse.innerHTML = '<i class="fa-solid fa-up-right-and-down-left-from-center me-1" aria-hidden="true"></i> Expand';
        btnCollapse.setAttribute("aria-label", "Expand all code sections");
      }
    }

    function toggleFold() {
      if (foldState === "expanded") {
        editor.execCommand("foldall");
        foldState = "collapsed";
        setStatus("All sections collapsed");
      } else {
        editor.execCommand("unfoldall");
        foldState = "expanded";
        setStatus("All sections expanded");
      }
      syncFoldButton();
    }

    editor.session.on("change", () => {
      if (foldState !== "expanded") {
        foldState = "expanded";
        syncFoldButton();
      }
    });
    // ───────────────────────────────────────────────────────────────────────

    function clearEditor() {
      editor.setValue("", -1);
      selectedCode.setValue("Click an element in the preview to see its HTML here.", -1);
      renderPreview();
      setStatus("Editor cleared");
    }

    function importFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const raw = String(e.target.result || "");
        let formatted = raw;
        try {
          formatted = html_beautify(raw, {
            indent_size: 2,
            wrap_line_length: 100,
            preserve_newlines: true,
            max_preserve_newlines: 2,
            end_with_newline: false,
            extra_liners: []
          });
        } catch (_) {}
        editor.setValue(formatted, -1);
        selectedCode.setValue("Click an element in the preview to see its HTML here.", -1);
        setTimeout(() => {
          editor.execCommand("unfoldall");
          foldState = "expanded";
          syncFoldButton();
        }, 0);
        renderPreview();
        setStatus(`Imported & expanded: ${file.name}`);
      };
      reader.onerror = () => setStatus("⚠️ Could not read the file");
      reader.readAsText(file);
    }

    function exportFile() {
      const blob = new Blob([editor.getValue()], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "document.html";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus("HTML exported");
    }

    // ── Panel collapse (Selected Element) ───────────────────────────────────
    const btnToggleSelected = document.getElementById("btnToggleSelected");
    const selectedCodeWrap = document.getElementById("selectedCodeWrap");

    function syncPanelHeight() {
      if (!selectedCodeWrap.classList.contains("collapsed")) {
        selectedCodeWrap.style.maxHeight = selectedCodeWrap.scrollHeight + "px";
      }
    }

    btnToggleSelected.addEventListener("click", () => {
      const isCollapsed = selectedCodeWrap.classList.contains("collapsed");
      const icon = btnToggleSelected.querySelector("i");
      if (isCollapsed) {
        selectedCodeWrap.classList.remove("collapsed");
        selectedCodeWrap.style.maxHeight = selectedCodeWrap.scrollHeight + "px";
        btnToggleSelected.setAttribute("aria-expanded", "true");
        icon.className = "fa-solid fa-chevron-up";
      } else {
        selectedCodeWrap.style.maxHeight = selectedCodeWrap.scrollHeight + "px";
        selectedCodeWrap.getBoundingClientRect();
        selectedCodeWrap.classList.add("collapsed");
        btnToggleSelected.setAttribute("aria-expanded", "false");
        icon.className = "fa-solid fa-chevron-down";
      }
    });

    window.addEventListener("load", syncPanelHeight);
    // ───────────────────────────────────────────────────────────────────────

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "ELEMENT_SELECTED") return;
      const pretty = html_beautify(data.html || "", {
        indent_size: 2,
        wrap_line_length: 100,
        preserve_newlines: true,
        max_preserve_newlines: 2,
        end_with_newline: false,
        extra_liners: []
      });
      selectedCode.setValue(pretty || "", -1);
      if (selectedCodeWrap.classList.contains("collapsed")) {
        btnToggleSelected.click();
      }
      setStatus(`Selected: <${String(data.tag || "").toLowerCase()}>`);
    });

    document.getElementById("btnPreview").addEventListener("click", openPreviewInNewTab);
    document.getElementById("btnFormat").addEventListener("click", formatHTML);
    btnCollapse.addEventListener("click", toggleFold);
    document.getElementById("btnSample").addEventListener("click", () => {
      let formatted = SAMPLE_HTML;
      try {
        formatted = html_beautify(SAMPLE_HTML, {
          indent_size: 2,
          wrap_line_length: 100,
          preserve_newlines: true,
          max_preserve_newlines: 2,
          end_with_newline: false,
          extra_liners: []
        });
      } catch (_) {}
      editor.setValue(formatted, -1);
      selectedCode.setValue("Click an element in the preview to see its HTML here.", -1);
      setTimeout(() => {
        editor.execCommand("unfoldall");
        foldState = "expanded";
        syncFoldButton();
      }, 0);
      renderPreview();
      setStatus("Sample HTML inserted & expanded");
    });
    document.getElementById("btnClear").addEventListener("click", clearEditor);
    document.getElementById("btnImport").addEventListener("click", () => fileInput.click());
    document.getElementById("btnExport").addEventListener("click", exportFile);
    btnTheme.addEventListener("click", toggleTheme);

    fileInput.addEventListener("change", (event) => {
      const file = event.target.files?.[0];
      if (file) importFile(file);
      fileInput.value = "";
    });

    // ── Divider resizable ───────────────────────────────────────────────
    (function () {
      const divider   = document.getElementById("splitDivider");
      const leftCol   = document.getElementById("leftCol");
      const container = document.getElementById("splitContainer");
      const STORAGE_KEY_WIDTH = "html-viewer-left-width";

      // Restaurar ancho guardado
      try {
        const saved = localStorage.getItem(STORAGE_KEY_WIDTH);
        if (saved) leftCol.style.width = saved;
      } catch (_) {}

      let dragging = false;
      let startX = 0;
      let startWidth = 0;

      divider.addEventListener("mousedown", (e) => {
        dragging = true;
        startX = e.clientX;
        startWidth = leftCol.getBoundingClientRect().width;
        divider.classList.add("dragging");
        document.body.classList.add("resizing");
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        const containerWidth = container.getBoundingClientRect().width;
        const delta = e.clientX - startX;
        let newWidth = startWidth + delta;
        const minPx = 200;
        const maxPx = containerWidth * 0.70;
        newWidth = Math.max(minPx, Math.min(maxPx, newWidth));
        leftCol.style.width = newWidth + "px";
      });

      document.addEventListener("mouseup", () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove("dragging");
        document.body.classList.remove("resizing");
        // Guardar preferencia
        try {
          localStorage.setItem(STORAGE_KEY_WIDTH, leftCol.style.width);
        } catch (_) {}
        // Forzar resize de Ace editors
        editor.resize();
        selectedCode.resize();
      });

      // Touch support
      divider.addEventListener("touchstart", (e) => {
        dragging = true;
        startX = e.touches[0].clientX;
        startWidth = leftCol.getBoundingClientRect().width;
        divider.classList.add("dragging");
        document.body.classList.add("resizing");
      }, { passive: true });

      document.addEventListener("touchmove", (e) => {
        if (!dragging) return;
        const containerWidth = container.getBoundingClientRect().width;
        const delta = e.touches[0].clientX - startX;
        let newWidth = startWidth + delta;
        const minPx = 200;
        const maxPx = containerWidth * 0.70;
        newWidth = Math.max(minPx, Math.min(maxPx, newWidth));
        leftCol.style.width = newWidth + "px";
      }, { passive: true });

      document.addEventListener("touchend", () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove("dragging");
        document.body.classList.remove("resizing");
        try {
          localStorage.setItem(STORAGE_KEY_WIDTH, leftCol.style.width);
        } catch (_) {}
        editor.resize();
        selectedCode.resize();
      });
    })();
    // ───────────────────────────────────────────────────────────────────

    document.getElementById("footerYear").textContent = new Date().getFullYear();

    loadTheme();
    loadInitialContent();
  </script>
</body>
</html>
